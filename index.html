<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitação de Eventos</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="container">

    <!-- HEADER COM LOGO -->
    <div class="header">
      <div class="header-text">
        <span class="badge">Formulário online</span>
        <h1>Solicitação de Eventos</h1>
        <p>
          Preencha os dados do evento, selecione os espaços da igreja e marque os ministérios que precisam ser acionados.
          Apenas os líderes dos ministérios selecionados serão notificados.
        </p>
      </div>

      <div class="header-logo">
        <img src="logo_cbo.png" alt="Logo CBO" />
      </div>
    </div>

    <!-- FORM -->
    <form id="eventForm">

      <div class="form-group">
        <label>Nome do evento</label>
        <input type="text" name="nomeEvento" required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Nome do responsável</label>
          <input type="text" name="responsavel" required />
        </div>

        <div class="form-group">
          <label>Contato</label>
          <input type="text" name="contato" required />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Data e hora do início</label>
          <input type="datetime-local" name="dataInicio" required />
        </div>

        <div class="form-group">
          <label>Data e hora do fim</label>
          <input type="datetime-local" name="dataFim" required />
        </div>
      </div>

      <h3>Espaços da igreja</h3>
      <div id="spacesContainer" class="grid"></div>

      <div class="form-group">
        <label>Objetivo do evento</label>
        <textarea name="objetivo" rows="3" required></textarea>
      </div>

      <h3>Ministérios</h3>
      <div id="ministriesContainer" class="grid"></div>

      <button id="submitButton" type="submit">Enviar solicitação</button>

      <div id="feedback" class="feedback hidden"></div>

    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
