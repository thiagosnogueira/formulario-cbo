<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitação de Eventos</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-text">
        <span class="badge">Formulário online</span>
        <h1>Solicitação de Eventos</h1>
        <p>
          Preencha os dados do evento, selecione os espaços da igreja e marque os ministérios que precisam ser acionados.
          Apenas os líderes dos ministérios selecionados serão notificados.
        </p>
      </div>

      <div class="header-logo">
        <img src="logo_cbo.png" alt="Logo CBO" />
      </div>
    </div>

    <form id="eventForm" class="card">
      <div class="form-group">
        <label for="nomeEvento">Nome do evento</label>
        <input type="text" id="nomeEvento" name="nomeEvento" placeholder="Ex.: Conferência da Juventude" required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="responsavel">Nome do responsável</label>
          <input type="text" id="responsavel" name="responsavel" placeholder="Nome completo" required />
        </div>

        <div class="form-group">
          <label for="contato">Contato</label>
          <input type="text" id="contato" name="contato" placeholder="Telefone, WhatsApp ou e-mail" required />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="dataInicio">Data e hora do início</label>
          <input type="datetime-local" id="dataInicio" name="dataInicio" required />
        </div>

        <div class="form-group">
          <label for="dataFim">Data e hora do fim</label>
          <input type="datetime-local" id="dataFim" name="dataFim" required />
        </div>
      </div>

      <div class="section-title">Espaços da igreja</div>
      <div id="spacesContainer" class="grid"></div>

      <div class="form-group">
        <label for="objetivo">Objetivo do evento</label>
        <textarea
          id="objetivo"
          name="objetivo"
          rows="4"
          placeholder="Descreva o objetivo do evento, público esperado e observações importantes."
          required
        ></textarea>
      </div>

      <div class="section-title">Qual ministério precisa ser acionado</div>
      <div id="ministriesContainer" class="grid"></div>

      <button id="submitButton" type="submit">Enviar solicitação</button>

      <div id="feedback" class="feedback hidden"></div>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
